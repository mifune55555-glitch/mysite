<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: orange;
      border: none;
      cursor: pointer;
    }

    a {
      color: orange;
      display: block;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>お問い合わせ</h1>

  <form action="https://formspree.io/f/xojyqgkw" method="POST">
    <input type="text" name="name" placeholder="お名前"><br>
    <input type="email" name="email" placeholder="メールアドレス"><br>
    <textarea name="message" rows="5" placeholder="お問い合わせ内容"></textarea><br>
    <button type="submit">送信</button>
  </form>

  <a href="index.html">トップに戻る</a>

</body>
</html>
